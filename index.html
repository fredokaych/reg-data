<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiga Ward — Voter Registration Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,400;9..40,500;9..40,700;9..40,900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('wiga_theme') || 'dark')</script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 500: '#10b981', 600: '#059669' }, gold: { 500: '#f59e0b' }, rose: { 500: '#f43f5e' } }, fontFamily: { display: ['"Space Grotesk"', 'sans-serif'], body: ['"DM Sans"', 'sans-serif'] } } } }
    </script>
    <style>
        :root,
        [data-theme="dark"] {
            --bg: #080c0a;
            --card: rgba(15, 22, 18, .82);
            --card-s: #0f1612;
            --elevated: #151e19;
            --input: rgba(15, 22, 18, .92);
            --txt: #e2e8f0;
            --txt2: rgba(226, 232, 240, .55);
            --txt3: rgba(226, 232, 240, .3);
            --txt4: rgba(226, 232, 240, .18);
            --brd: rgba(16, 185, 129, .09);
            --brd-h: rgba(16, 185, 129, .2);
            --brd-f: rgba(16, 185, 129, .35);
            --grid: rgba(16, 185, 129, .025);
            --orb: .12;
            --shadow: 0 0 40px rgba(16, 185, 129, .04);
            --mover: rgba(0, 0, 0, .55);
            --thbg: #0f1612;
            --dbord: #0f1612;
            --today: rgba(16, 185, 129, .035);
            --rhov: rgba(16, 185, 129, .055);
            --ralt: rgba(16, 185, 129, .012);
            --inv-bg: rgba(245, 158, 11, .07);
            --inv-brd: rgba(245, 158, 11, .12);
            --inv-txt: #f59e0b;
        }

        [data-theme="light"] {
            --bg: #f4f2ed;
            --card: rgba(255, 255, 255, .88);
            --card-s: #ffffff;
            --elevated: #f9f8f5;
            --input: #ffffff;
            --txt: #1a1a1a;
            --txt2: rgba(26, 26, 26, .55);
            --txt3: rgba(26, 26, 26, .3);
            --txt4: rgba(26, 26, 26, .12);
            --brd: rgba(0, 0, 0, .07);
            --brd-h: rgba(0, 0, 0, .14);
            --brd-f: rgba(16, 185, 129, .4);
            --grid: rgba(0, 0, 0, .025);
            --orb: .04;
            --shadow: 0 2px 16px rgba(0, 0, 0, .06);
            --mover: rgba(0, 0, 0, .3);
            --thbg: #f9f8f5;
            --dbord: #ffffff;
            --today: rgba(16, 185, 129, .06);
            --rhov: rgba(16, 185, 129, .06);
            --ralt: rgba(0, 0, 0, .018);
            --inv-bg: rgba(180, 83, 9, .06);
            --inv-brd: rgba(180, 83, 9, .15);
            --inv-txt: #b45309;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--txt);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background .35s, color .35s
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: var(--orb);
            pointer-events: none;
            z-index: 0;
            transition: opacity .35s
        }

        .bg-orb-1 {
            width: 520px;
            height: 520px;
            background: #10b981;
            top: -120px;
            left: -80px;
            animation: f1 22s ease-in-out infinite
        }

        .bg-orb-2 {
            width: 420px;
            height: 420px;
            background: #f59e0b;
            bottom: -80px;
            right: -60px;
            animation: f2 26s ease-in-out infinite
        }

        .bg-orb-3 {
            width: 280px;
            height: 280px;
            background: #10b981;
            top: 55%;
            right: 18%;
            animation: f3 19s ease-in-out infinite
        }

        @keyframes f1 {

            0%,
            100% {
                transform: translate(0, 0)
            }

            33% {
                transform: translate(90px, 70px)
            }

            66% {
                transform: translate(-40px, 110px)
            }
        }

        @keyframes f2 {

            0%,
            100% {
                transform: translate(0, 0)
            }

            33% {
                transform: translate(-70px, -50px)
            }

            66% {
                transform: translate(50px, -90px)
            }
        }

        @keyframes f3 {

            0%,
            100% {
                transform: translate(0, 0)
            }

            50% {
                transform: translate(-100px, -70px)
            }
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 64px 64px;
            pointer-events: none;
            z-index: 0
        }

        .gc {
            background: var(--card);
            backdrop-filter: blur(14px);
            border: 1px solid var(--brd);
            border-radius: 16px;
            transition: border-color .3s, box-shadow .3s, background .35s
        }

        .gc:hover {
            border-color: var(--brd-h);
            box-shadow: var(--shadow)
        }

        .ptk {
            height: 7px;
            background: rgba(16, 185, 129, .08);
            border-radius: 4px;
            overflow: hidden
        }

        [data-theme="light"] .ptk {
            background: rgba(16, 185, 129, .1)
        }

        .pfl {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            border-radius: 4px;
            transition: width .9s cubic-bezier(.4, 0, .2, 1)
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(16, 185, 129, .18);
            border-radius: 3px
        }

        .ti {
            animation: tI .32s ease-out forwards
        }

        .to {
            animation: tO .28s ease-in forwards
        }

        @keyframes tI {
            from {
                transform: translateX(110%);
                opacity: 0
            }

            to {
                transform: translateX(0);
                opacity: 1
            }
        }

        @keyframes tO {
            from {
                transform: translateX(0);
                opacity: 1
            }

            to {
                transform: translateX(110%);
                opacity: 0
            }
        }

        .dth {
            position: sticky;
            top: 0;
            background: var(--thbg);
            z-index: 10;
            transition: background .35s
        }

        .dz {
            border: 2px dashed rgba(16, 185, 129, .25);
            transition: all .25s
        }

        .dz.dov {
            border-color: #10b981;
            background: rgba(16, 185, 129, .04)
        }

        .pd {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pd 2s ease-in-out infinite
        }

        @keyframes pd {

            0%,
            100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: .4;
                transform: scale(1.6)
            }
        }

        .inp {
            background: var(--input);
            border: 1px solid var(--brd);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--txt);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: border-color .2s, box-shadow .2s, background .35s;
            outline: none;
            width: 100%
        }

        .inp:focus {
            border-color: var(--brd-f);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, .08)
        }

        .inp::placeholder {
            color: var(--txt4)
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(.65);
            cursor: pointer
        }

        [data-theme="light"] input[type="date"]::-webkit-calendar-picker-indicator {
            filter: none
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0
        }

        input[type="number"] {
            -moz-appearance: textfield
        }

        .bp {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: transform .15s, box-shadow .15s
        }

        .bp:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, .25)
        }

        .bp:active {
            transform: translateY(0)
        }

        .bs {
            background: rgba(16, 185, 129, .08);
            color: #10b981;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid rgba(16, 185, 129, .18);
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: background .15s
        }

        .bs:hover {
            background: rgba(16, 185, 129, .13)
        }

        .bdd {
            background: rgba(244, 63, 94, .08);
            color: #f43f5e;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid rgba(244, 63, 94, .18);
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: background .15s
        }

        .bdd:hover {
            background: rgba(244, 63, 94, .13)
        }

        .tb {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
            border: none;
            font-family: 'DM Sans', sans-serif
        }

        .ta {
            background: rgba(16, 185, 129, .13);
            color: #10b981
        }

        .tn {
            background: transparent;
            color: var(--txt3)
        }

        .tn:hover {
            color: var(--txt2)
        }

        .fi {
            animation: fi .5s ease-out both
        }

        @keyframes fi {
            from {
                opacity: 0;
                transform: translateY(12px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .mov {
            position: fixed;
            inset: 0;
            background: var(--mover);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .mbx {
            background: var(--card-s);
            border: 1px solid var(--brd);
            border-radius: 16px;
            padding: 28px;
            max-width: 540px;
            width: 92%;
            max-height: 90vh;
            overflow-y: auto;
            transition: background .35s
        }

        .tw {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch
        }

        .ib {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid var(--brd);
            background: var(--card);
            transition: all .2s;
            color: var(--txt2);
            font-size: 15px
        }

        .ib:hover {
            border-color: var(--brd-h);
            color: var(--txt)
        }

        .cblk {
            background: var(--elevated);
            border: 1px solid var(--brd);
            border-radius: 8px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 11.5px;
            color: var(--txt2);
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
            max-height: 150px;
            overflow-y: auto;
            transition: background .35s
        }

        .sn {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(16, 185, 129, .12);
            color: #10b981;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        @media(prefers-reduced-motion:reduce) {

            *,
            *::before,
            *::after {
                animation-duration: .01ms !important;
                transition-duration: .01ms !important
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div id="root" style="position:relative;z-index:1"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        /* ═══════════ CONSTANTS ═══════════ */
        const START = new Date(2026, 2, 30, 12);
        const DATES = Array.from({ length: 30 }, (_, i) => { const d = new Date(START); d.setDate(d.getDate() + i); return d });
        const SK = 'wiga_voter_data_v1', CK = 'wiga_config_v2';
        const KN = ['Kit 1', 'Kit 2', 'Kit 3'], KK = ['kit1', 'kit2', 'kit3'];
        const KC = ['#10b981', '#f59e0b', '#f43f5e'], KCL = ['rgba(16,185,129,.72)', 'rgba(245,158,11,.72)', 'rgba(244,63,94,.72)'];
        const DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

        /* Timezone-safe date formatting */
        const fmtD = d => { const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0'); return y + '-' + m + '-' + day };
        const fmtS = d => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        const fmtF = d => d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });

        const SQL = 'DROP POLICY IF EXISTS "Public read" ON registrations;\n\nCREATE POLICY "Public read" ON registrations\n  FOR SELECT USING (true);\n\nCREATE POLICY "Admin write" ON registrations\n  FOR ALL USING (auth.uid() IS NOT NULL)\n  WITH CHECK (auth.uid() IS NOT NULL);';

        /* ═══════════ DATA HELPERS ═══════════ */
        const empty = () => { const o = {}; DATES.forEach(d => o[fmtD(d)] = { kit1: null, kit2: null, kit3: null }); return o };
        const loadLocal = () => { try { const s = localStorage.getItem(SK); if (s) return Object.assign(empty(), JSON.parse(s)) } catch (e) { } return empty() };
        const saveLocal = d => { try { localStorage.setItem(SK, JSON.stringify(d)) } catch (e) { } };
        const sbToLocal = rows => { const d = empty(); if (!rows) return d; rows.forEach(r => { if (d.hasOwnProperty(r.date)) d[r.date] = { kit1: r.kit1, kit2: r.kit2, kit3: r.kit3 } }); return d };
        const sampleCSV = () => { let c = 'Date,Kit 1,Kit 2,Kit 3\n'; DATES.forEach(d => c += fmtD(d) + ',,\n'); return c };
        const exportCSV = data => { let c = 'Date,Day,Kit 1,Kit 2,Kit 3,Total\n'; DATES.forEach(d => { const k = fmtD(d), e = data[k] || {}; const t = [e.kit1, e.kit2, e.kit3].reduce((a, b) => (a || 0) + (b || 0), 0); c += k + ',' + DAYS[d.getDay()] + ',' + (e.kit1 ?? '') + ',' + (e.kit2 ?? '') + ',' + (e.kit3 ?? '') + ',' + (t || '') + '\n' }); return c };

        /* ═══════════ DATABASE — anon key only, Supabase Auth ═══════════ */
        const DB = {
            client: null, ready: false, _onAuth: null,

            init(url, ak, onAuth) {
                try {
                    if (typeof supabase === 'undefined') return false;
                    this.client = supabase.createClient(url, ak);
                    this.ready = true;
                    this._onAuth = onAuth;
                    this.client.auth.onAuthStateChange(function (_ev, session) {
                        if (this._onAuth) this._onAuth(!!session);
                    }.bind(this));
                    return true;
                } catch (e) { return false }
            },

            async fetchAll() {
                if (!this.client || !this.ready) return null;
                var res = await this.client.from('registrations').select('*').order('date', { ascending: true });
                if (res.error) { return { error: res.error.message } }
                return res.data;
            },

            async upsert(date, kit1, kit2, kit3) {
                if (!this.client || !this.ready) return { error: 'Not connected' };
                var res = await this.client.from('registrations').upsert({ date: date, kit1: kit1, kit2: kit2, kit3: kit3 }, { onConflict: 'date' });
                if (res.error) return { error: res.error.message };
                return {};
            },

            async deleteAll() {
                if (!this.client || !this.ready) return { error: 'Not connected' };
                var res = await this.client.from('registrations').delete().gte('date', '2026-01-01');
                if (res.error) return { error: res.error.message };
                return {};
            },

            async signIn(email, password) {
                var res = await this.client.auth.signInWithPassword({ email: email, password: password });
                if (res.error) return { ok: false, msg: res.error.message };
                return { ok: true };
            },

            async signOut() {
                await this.client.auth.signOut();
            },

            async getSession() {
                var res = await this.client.auth.getSession();
                return res.data.session;
            },

            getConfig() { try { var c = JSON.parse(localStorage.getItem(CK)); return c ? { url: c.url, ak: c.ak } : null } catch (e) { return null } },
            saveConfig(c) { localStorage.setItem(CK, JSON.stringify({ url: c.url, ak: c.ak })) },
            clearConfig() { localStorage.removeItem(CK) },
            isConfigured() { return !!this.getConfig() }
        };

        /* ═══════════ CHART PLUGIN ═══════════ */
        Chart.register({
            id: 'ct', afterDraw: function (chart) {
                if (chart.config.type !== 'doughnut') return;
                if (!chart.chartArea) return;
                var ca = chart.chartArea, cx = (ca.left + ca.right) / 2, cy = (ca.top + ca.bottom) / 2;
                var v = chart.data.datasets[0].data, ph = v.length === 3 && v.every(function (x) { return x < 1 });
                var cs = getComputedStyle(document.documentElement);
                var tc = cs.getPropertyValue('--txt').trim() || '#fff';
                var tc3 = cs.getPropertyValue('--txt3').trim() || 'rgba(226,232,240,.3)';
                var ctx = chart.ctx; ctx.save(); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                if (ph) { ctx.font = '500 13px "DM Sans"'; ctx.fillStyle = tc3; ctx.fillText('No data yet', cx, cy) }
                else { var t = v.reduce(function (a, b) { return a + b }, 0); ctx.font = '900 26px "Space Grotesk"'; ctx.fillStyle = tc; ctx.fillText(t.toLocaleString(), cx, cy - 8); ctx.font = '400 11px "DM Sans"'; ctx.fillStyle = tc3; ctx.fillText('Total', cx, cy + 14) }
                ctx.restore();
            }
        });

        function cOpts(theme) {
            var dk = theme === 'dark';
            return {
                grid: dk ? 'rgba(16,185,129,.04)' : 'rgba(0,0,0,.06)', tick: dk ? 'rgba(226,232,240,.3)' : 'rgba(26,26,26,.4)',
                tbg: dk ? '#151e19' : '#ffffff', tbrd: dk ? 'rgba(16,185,129,.15)' : 'rgba(0,0,0,.1)', tt: dk ? '#e2e8f0' : '#1a1a1a', tb: dk ? 'rgba(226,232,240,.65)' : 'rgba(26,26,26,.65)',
                dbord: dk ? '#0f1612' : '#ffffff'
            }
        }

        /* ═══════════ TOASTS ═══════════ */
        var _tid = 0;
        function Toasts({ list }) {
            return React.createElement('div', { style: { position: 'fixed', top: 20, right: 20, zIndex: 200, display: 'flex', flexDirection: 'column', gap: 8 } },
                list.map(function (t) {
                    var bc = t.type === 'success' ? '#10b981' : t.type === 'error' ? '#f43f5e' : '#f59e0b';
                    var ic = t.type === 'success' ? 'fa-circle-check' : t.type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-info';
                    return React.createElement('div', { key: t.id, className: 'gc ' + (t.out ? 'to' : 'ti'), style: { padding: '12px 18px', display: 'flex', alignItems: 'center', gap: 10, minWidth: 240, maxWidth: 380, borderLeft: '3px solid ' + bc } },
                        React.createElement('i', { className: 'fas ' + ic, style: { color: bc, fontSize: 14, flexShrink: 0 } }),
                        React.createElement('span', { style: { fontSize: 13, color: 'var(--txt)', lineHeight: 1.4 } }, t.msg)
                    );
                })
            );
        }

        /* ═══════════ ANIMATED NUMBER ═══════════ */
        function ANum({ value, dur }) {
            dur = dur || 700; var s = useRef({ v: 0, prev: 0 }); var st = useState(0); var disp = st[0]; var setDisp = st[1]; s.current.prev = s.current.v; s.current.v = value;
            useEffect(function () {
                var start = s.current.prev, end = s.current.v; if (start === end) return; var t0 = performance.now();
                function run(now) { var p = Math.min((now - t0) / dur, 1); var ease = 1 - Math.pow(1 - p, 3); setDisp(Math.round(start + (end - start) * ease)); if (p < 1) requestAnimationFrame(run) } requestAnimationFrame(run)
            }, [value, dur]);
            return React.createElement('span', null, disp.toLocaleString())
        }

        /* ═══════════ SETUP MODAL ═══════════ */
        function SetupModal({ onDone, onSkip }) {
            var s1 = useState(''); var url = s1[0]; var setUrl = s1[1];
            var s2 = useState(''); var ak = s2[0]; var setAk = s2[1];
            var s3 = useState(false); var loading = s3[0]; var setLoading = s3[1];
            var s4 = useState(''); var err = s4[0]; var setErr = s4[1];
            var s5 = useState(false); var copied = s5[0]; var setCopied = s5[1];

            var cfg = DB.getConfig();
