        function ANum({ value, dur }) {
            dur = dur || 700;
            const s = useRef({ v:0, prev:0 });
            const [disp, setDisp] = useState(0);
            s.current.prev = s.current.v; s.current.v = value;

                const k=fmtD(d), e=data[k]||{}, dt=[e.kit1,e.kit2,e.kit3].reduce((a,b)=>(a||0)+(b||0),0);
                cum += dt;
                return { i:i+1, d, k, e, dt, cum, has:dt>0, today:k===fmtD(new Date()) };
            });

            function startEdit(r) { if (!isAdmin) return; setEditK(r.k); setEv({ kit1:r.e.kit1!==null?''+r.e.kit1:'', kit2:r.e.kit2!==null?''+r.e.kit2:'', kit3:r.e.kit3!==null?''+r.e.kit3:'' }) }

            async function saveRow() {
                const nd = { ...data, [editK]:{ kit1:ev.kit1!==''?parseInt(ev.kit1):null, kit2:ev.kit2!==''?parseInt(ev.kit2):null, kit3:ev.kit3!==''?parseInt(ev.kit3):null } };
                const res = await DB.upsert(editK, nd[editK].kit1, nd[editK].kit2, nd[editK].kit3);
                if (!res.error) { setData(nd); setEditK(null); toast('Entry updated', 'success') }
                else toast('Failed to save — you may have been signed out', 'error');
            }

            const headers = ['#','Date','Day',KN[0],KN[1],KN[2],'Daily','Cumulative'];

            return React.createElement('div', { className:'gc fi', style:{ padding:0, animationDelay:'640ms' } },
                React.createElement('div', { style:{ padding:'18px 18px 14px', borderBottom:'1px solid var(--brd)', transition:'border-color .35s' } },
                    React.createElement('h3', { className:'font-display', style:{ fontSize:15, fontWeight:700, color:'var(--txt)', transition:'color .35s' } }, 'Detailed Records'),
                    React.createElement('p', { style:{ fontSize:11, color:'var(--txt4)', marginTop:2, transition:'color .35s' } }, isAdmin ? 'Click any row to edit inline' : 'Read-only view')
                ),
                React.createElement('div', { className:'tw', style:{ maxHeight:500, overflowY:'auto' } },
                    React.createElement('table', { style:{ width:'100%', borderCollapse:'collapse', fontSize:13 } },
                        React.createElement('thead', null,
                            React.createElement('tr', { className:'dth' },
                                headers.map((h,hi) => React.createElement('th', { key:hi, style:{ padding:'11px 14px', textAlign:hi>=3?'right':'left', fontSize:10, fontWeight:600, textTransform:'uppercase', letterSpacing:'.06em', color:hi>=3&&hi<6?KC[hi-3]:'var(--txt3)', borderBottom:'1px solid var(--brd)', transition:'all .35s' } }, h))
                            )
                        ),
                        React.createElement('tbody', null,
                            rows.map((r,idx) => {
                                const isEd = editK === r.k;
                                return React.createElement('tr', { key:r.k,
                                    onClick:() => { if (!isEd) startEdit(r) },
                                    style:{ cursor:isAdmin?'pointer':'default', background:r.today?'var(--today)':idx%2?'var(--ralt)':'transparent', borderBottom:'1px solid var(--brd)', transition:'background .12s' },
                                    onMouseEnter:e => { if (isAdmin&&!isEd) e.currentTarget.style.background='var(--rhov)' },
                                    onMouseLeave:e => { e.currentTarget.style.background=r.today?'var(--today)':idx%2?'var(--ralt)':'transparent' }
                                },
                                    React.createElement('td', { style:{ padding:'9px 14px', color:'var(--txt4)', fontSize:11 } }, r.i),
                                    React.createElement('td', { style:{ padding:'9px 14px', color:r.today?'#10b981':'var(--txt2)', fontWeight:r.today?600:400, whiteSpace:'nowrap' } },
                                        fmtS(r.d),
                                        r.today ? React.createElement('span', { style:{ fontSize:9, color:'#10b981', marginLeft:5, fontWeight:500, border:'1px solid rgba(16,185,129,.2)', borderRadius:4, padding:'1px 5px' } }, 'TODAY') : null
                                    ),
                                    React.createElement('td', { style:{ padding:'9px 14px', color:'var(--txt3)', fontSize:11 } }, DAYS[r.d.getDay()]),
                                    isEd
                                        ? KK.map(k => React.createElement('td', { key:k, style:{ padding:'5px 6px' } },
                                            React.createElement('input', { className:'inp', type:'number', style:{ padding:'5px 7px', fontSize:12, textAlign:'right', width:66 }, value:ev[k], min:'0',
                                                onChange:e => { const nv={...ev}; nv[k]=e.target.value; setEv(nv) },
                                                onClick:e => e.stopPropagation(),
                                                onKeyDown:e => { if(e.key==='Enter') saveRow(); if(e.key==='Escape') setEditK(null) },
                                                autoFocus:true })
                                          ))
                                        : KK.map((k,ki) => React.createElement('td', { key:k, style:{ padding:'9px 14px', textAlign:'right', color:r.e[k]!==null?KC[ki]:'var(--txt4)', fontWeight:r.e[k]!==null?600:400 } }, r.e[k]!==null?r.e[k].toLocaleString():'—')),
                                    isEd
                                        ? React.createElement(React.Fragment, null,
                                            React.createElement('td', { style:{ padding:'9px 14px', textAlign:'right' } },
                                                React.createElement('button', { className:'bp', style:{ padding:'4px 12px', fontSize:11, marginRight:4 }, onClick:e => { e.stopPropagation(); saveRow() } }, 'Save'),
                                                React.createElement('button', { className:'bs', style:{ padding:'4px 12px', fontSize:11 }, onClick:e => { e.stopPropagation(); setEditK(null) } }, 'Cancel')
                                            ),
                                            React.createElement('td', null)
                                          )
                                        : React.createElement(React.Fragment, null,
                                            React.createElement('td', { style:{ padding:'9px 14px', textAlign:'right', color:r.dt>0?'var(--txt)':'var(--txt4)', fontWeight:r.dt>0?700:400 } }, r.dt>0?r.dt.toLocaleString():'—'),
                                            React.createElement('td', { style:{ padding:'9px 14px', textAlign:'right', color:r.cum>0?'var(--txt2)':'var(--txt4)', fontWeight:500 } }, r.cum>0?r.cum.toLocaleString():'—')
                                          )
                                );
                            })
                        )
                    )
                )
            );
        }

        /* ═══════════ APP ═══════════ */
        function App() {
            const [data, setData] = useState(empty);
            const [toasts, setToasts] = useState([]);
            const [theme, setThemeState] = useState(localStorage.getItem('wiga_theme') || 'dark');
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [showSetup, setShowSetup] = useState(false);
            const [fetching, setFetching] = useState(true);
            const [fetchErr, setFetchErr] = useState(false);

            function setTheme(t) { document.documentElement.setAttribute('data-theme', t); localStorage.setItem('wiga_theme', t); setThemeState(t) }

            const toast = useCallback((msg, type='success') => {
                const id = ++_tid;
                setToasts(p => [...p, { id, msg, type, out:false }]);
                setTimeout(() => {
                    setToasts(p => p.map(t => t.id===id ? {...t, out:true} : t));
                    setTimeout(() => setToasts(p => p.filter(t => t.id!==id)), 300);
                }, 3500);
            }, []);

            const onAuthChange = useCallback((authed) => {
                setIsAdmin(authed);
                if (!authed) toast('Session ended', 'info');
            }, [toast]);

            useEffect(() => {
                if (!SB_URL || SB_URL.includes('PASTE') || !SB_KEY || SB_KEY.includes('PASTE')) {
                    setFetching(false);
                    setFetchErr(true);
                    return;
                }

                const ok = DB.init(SB_URL, SB_KEY, onAuthChange);
                if (!ok) { setFetching(false); setFetchErr(true); return; }

                DB.getSession()
                    .then(session => { setIsAdmin(!!session); return DB.fetchAll(); })
                    .then(rows => {
                        if (Array.isArray(rows)) { setData(sbToLocal(rows)); setFetchErr(false); }
                        else setFetchErr(true);
                        setFetching(false);
                    })
                    .catch(() => { setFetchErr(true); setFetching(false); });
            }, [onAuthChange]);

            useEffect(() => {
                if (!DB.ready) return;
                const iv = setInterval(() => {
                    DB.fetchAll().then(rows => { if (Array.isArray(rows)) { setData(sbToLocal(rows)); setFetchErr(false); } });
                }, 60000);
                return () => clearInterval(iv);
            }, []);

            function handleLogin() { setIsAdmin(true); setShowLogin(false); toast('Signed in as admin', 'success'); }
            function handleLogout() { DB.signOut(); setIsAdmin(false); toast('Signed out', 'info'); }

            const done = useMemo(() => DATES.filter(d => { const e = data[fmtD(d)]; return e && [e.kit1,e.kit2,e.kit3].some(v => v!==null && v>0) }).length, [data]);

            if (fetching) return React.createElement('div', { style:{ display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh', flexDirection:'column', gap:14 } },
                React.createElement('div', { style:{ width:36, height:36, border:'3px solid var(--brd)', borderTopColor:'#10b981', borderRadius:'50%', animation:'spin 1s linear infinite' } }),
                React.createElement('p', { style:{ fontSize:13, color:'var(--txt3)' } }, 'Loading dashboard…')
            );

            return React.createElement('div', { style:{ minHeight:'100vh' } },
                React.createElement(Toasts, { list:toasts }),
                showSetup ? React.createElement(SetupModal, { onClose:() => setShowSetup(false) }) : null,
                showLogin ? React.createElement(LoginModal, { onOk:handleLogin, onCancel:() => setShowLogin(false) }) : null,
                React.createElement(Header, { done, theme, setTheme, isAdmin, setShowLogin, handleLogout, openSetup:() => setShowSetup(true) }),
                React.createElement('main', { style:{ maxWidth:1280, margin:'0 auto', padding:'22px 24px', display:'flex', flexDirection:'column', gap:20 } },
                    fetchErr ? React.createElement(Banner, { msg:'Could not connect to Supabase. Check credentials in the HTML file.', icon:'fa-triangle-exclamation', onAction:() => setShowSetup(true), actionLabel:'View Info' }) : null,
                    React.createElement(Cards, { data }),
                    isAdmin
                        ? React.createElement(Update, { data, setData, toast })
                        : React.createElement(Banner, { msg:'Read-only view. Admin sign-in required to add or edit data.', icon:'fa-lock', onAction:() => setShowLogin(true), actionLabel:'Sign In' })
                    ,
                    React.createElement('div', { style:{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(min(100%,380px),1fr))', gap:14 } },
                        React.createElement(BarChart, { data, theme }),
                        React.createElement(DonutChart, { data, theme })
                    ),
                    React.createElement(Table, { data, setData, toast, isAdmin })
                ),
                React.createElement('footer', { style:{ textAlign:'center', padding:'28px 24px', borderTop:'1px solid var(--brd)', marginTop:16, transition:'border-color .35s' } },
                    React.createElement('p', { style:{ fontSize:11, color:'var(--txt4)', transition:'color .35s' } }, 'Wiga Ward Voter Registration Dashboard — Synced via Supabase')
                )
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App, null));
    </script>
</body>
</html>
